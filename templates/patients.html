<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients - SkinX Medical AI Platform</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/modern.css') }}" rel="stylesheet">
    
    <style>
        .patients-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .patients-title {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin: 0;
        }
        
        .patients-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .search-box {
            position: relative;
            width: 300px;
        }
        
        .search-box input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #0066cc;
        }
        
        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }
        
        .btn-add-patient {
            background: linear-gradient(135deg, #0066cc 0%, #00a896 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-add-patient:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 102, 204, 0.3);
        }
        
        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }
        
        .filter-tab {
            background: none;
            border: none;
            padding: 8px 16px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            margin-bottom: -12px;
        }
        
        .filter-tab:hover {
            color: #0066cc;
        }
        
        .filter-tab.active {
            color: #0066cc;
            border-bottom-color: #0066cc;
        }
        
        .patients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .patient-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border-left: 4px solid #0066cc;
        }
        
        .patient-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }
        
        .patient-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .patient-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: 600;
        }
        
        .patient-info h4 {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin: 0 0 5px 0;
        }
        
        .patient-info p {
            color: #666;
            margin: 0;
            font-size: 14px;
        }
        
        .patient-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .detail-label {
            font-size: 12px;
            color: #999;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .detail-value {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }
        
        .patient-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #0066cc;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .patient-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-patient-action {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .btn-patient-action:hover {
            background: #f8f9fa;
            border-color: #0066cc;
            color: #0066cc;
        }
        
        .btn-patient-action.primary {
            background: #0066cc;
            color: white;
            border-color: #0066cc;
        }
        
        .btn-patient-action.primary:hover {
            background: #0052a3;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
        }
        
        .pagination button {
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .pagination button:hover {
            background: #f8f9fa;
            border-color: #0066cc;
        }
        
        .pagination button.active {
            background: #0066cc;
            color: white;
            border-color: #0066cc;
        }
        
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state i {
            font-size: 64px;
            color: #ccc;
            margin-bottom: 20px;
        }
        
        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #333;
        }
        
        .empty-state p {
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .patients-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .patients-actions {
                width: 100%;
                flex-direction: column;
            }
            
            .search-box {
                width: 100%;
            }
            
            .patients-grid {
                grid-template-columns: 1fr;
            }
            
            .patient-details {
                grid-template-columns: 1fr;
            }
            
            .patient-stats {
                flex-direction: column;
                gap: 10px;
            }
            
            .patient-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <!-- Main Content Area -->
    <div class="main-content" id="mainContent">

        <header class="top-header">

        <!-- Patients Content -->
        <main class="dashboard-content">

                <h1 class="patients-title">Patients</h1>

            <div class="filter-tabs">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        class PatientsManager {
            constructor() {
                this.patients = [];
                this.currentPage = 1;
                this.patientsPerPage = 9;
                this.currentFilter = 'all';
                this.initializeEventListeners();
                this.loadPatients();
                this.loadUserData();
            }
            
            initializeEventListeners() {
                // Search functionality
                const searchInput = document.getElementById('patientSearch');
                if (searchInput) {
                    searchInput.addEventListener('input', (e) => {
                        this.searchPatients(e.target.value);
                    });
                }
                
                // Filter tabs
                const filterTabs = document.querySelectorAll('.filter-tab');
                filterTabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        filterTabs.forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        this.currentFilter = tab.dataset.filter;
                        this.filterPatients();
                    });
                });
            }
            
            loadUserData() {
                // Load user data from session
                const user = JSON.parse(sessionStorage.getItem('skinx_user') || localStorage.getItem('skinx_user') || '{}');
                const userName = document.getElementById('userName');
                const userRole = document.getElementById('userRole');
                
                if (userName) userName.textContent = user.name || 'Dr. Professional';
                if (userRole) userRole.textContent = user.role || 'Healthcare Provider';
            }
            
            loadPatients() {
                // Simulate loading patients data
                this.patients = [
                    {
                        id: 1,
                        name: 'John Smith',
                        email: 'john.smith@email.com',
                        phone: '+1 (555) 123-4567',
                        age: 45,
                        gender: 'Male',
                        bloodType: 'O+',
                        lastVisit: '2024-01-15',
                        totalAnalyses: 12,
                        criticalConditions: 1,
                        followUpRequired: true
                    },
                    {
                        id: 2,
                        name: 'Sarah Johnson',
                        email: 'sarah.johnson@email.com',
                        phone: '+1 (555) 987-6543',
                        age: 32,
                        gender: 'Female',
                        bloodType: 'A+',
                        lastVisit: '2024-01-18',
                        totalAnalyses: 8,
                        criticalConditions: 0,
                        followUpRequired: false
                    },
                    {
                        id: 3,
                        name: 'Michael Brown',
                        email: 'michael.brown@email.com',
                        phone: '+1 (555) 456-7890',
                        age: 58,
                        gender: 'Male',
                        bloodType: 'B+',
                        lastVisit: '2024-01-10',
                        totalAnalyses: 15,
                        criticalConditions: 2,
                        followUpRequired: true
                    },
                    {
                        id: 4,
                        name: 'Emily Davis',
                        email: 'emily.davis@email.com',
                        phone: '+1 (555) 234-5678',
                        age: 28,
                        gender: 'Female',
                        bloodType: 'AB+',
                        lastVisit: '2024-01-20',
                        totalAnalyses: 5,
                        criticalConditions: 0,
                        followUpRequired: false
                    },
                    {
                        id: 5,
                        name: 'Robert Wilson',
                        email: 'robert.wilson@email.com',
                        phone: '+1 (555) 345-6789',
                        age: 67,
                        gender: 'Male',
                        bloodType: 'O-',
                        lastVisit: '2024-01-12',
                        totalAnalyses: 20,
                        criticalConditions: 3,
                        followUpRequired: true
                    },
                    {
                        id: 6,
                        name: 'Lisa Anderson',
                        email: 'lisa.anderson@email.com',
                        phone: '+1 (555) 678-9012',
                        age: 41,
                        gender: 'Female',
                        bloodType: 'A-',
                        lastVisit: '2024-01-19',
                        totalAnalyses: 7,
                        criticalConditions: 0,
                        followUpRequired: false
                    }
                ];
                
                this.renderPatients();
            }
            
            renderPatients() {
                const grid = document.getElementById('patientsGrid');
                if (!grid) return;
                
                const filteredPatients = this.getFilteredPatients();
                const startIndex = (this.currentPage - 1) * this.patientsPerPage;
                const endIndex = startIndex + this.patientsPerPage;
                const pagePatients = filteredPatients.slice(startIndex, endIndex);
                
                if (pagePatients.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state" style="grid-column: 1 / -1;">
                            <i class="fas fa-users"></i>
                            <h3>No patients found</h3>
                            <p>Try adjusting your search or filters</p>
                            <button class="btn-add-patient" onclick="addNewPatient()">
                                <i class="fas fa-plus"></i>
                                Add First Patient
                            </button>
                        </div>
                    `;
                    return;
                }
                
                grid.innerHTML = pagePatients.map(patient => `
                    <div class="patient-card" onclick="viewPatientDetails(${patient.id})">
                        <div class="patient-header">
                            <div class="patient-avatar">
                                ${patient.name.split(' ').map(n => n[0]).join('')}
                            </div>
                            <div class="patient-info">
                                <h4>${patient.name}</h4>
                                <p>${patient.email}</p>
                            </div>
                        </div>
                        
                        <div class="patient-details">
                            <div class="detail-item">
                                <span class="detail-label">Age</span>
                                <span class="detail-value">${patient.age} years</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Gender</span>
                                <span class="detail-value">${patient.gender}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Blood Type</span>
                                <span class="detail-value">${patient.bloodType}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Last Visit</span>
                                <span class="detail-value">${this.formatDate(patient.lastVisit)}</span>
                            </div>
                        </div>
                        
                        <div class="patient-stats">
                            <div class="stat-item">
                                <div class="stat-value">${patient.totalAnalyses}</div>
                                <div class="stat-label">Analyses</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">${patient.criticalConditions}</div>
                                <div class="stat-label">Critical</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">${patient.followUpRequired ? 'Yes' : 'No'}</div>
                                <div class="stat-label">Follow-up</div>
                            </div>
                        </div>
                        
                        <div class="patient-actions">
                            <button class="btn-patient-action primary" onclick="event.stopPropagation(); startAnalysis(${patient.id})">
                                <i class="fas fa-microscope"></i>
                                Analyze
                            </button>
                            <button class="btn-patient-action" onclick="event.stopPropagation(); viewHistory(${patient.id})">
                                <i class="fas fa-history"></i>
                                History
                            </button>
                        </div>
                    </div>
                `).join('');
                
                this.updatePagination();
            }
            
            getFilteredPatients() {
                let filtered = [...this.patients];
                
                // Apply filter
                switch (this.currentFilter) {
                    case 'recent':
                        filtered = filtered.filter(p => {
                            const daysSinceVisit = Math.floor((new Date() - new Date(p.lastVisit)) / (1000 * 60 * 60 * 24));
                            return daysSinceVisit <= 7;
                        });
                        break;
                    case 'critical':
                        filtered = filtered.filter(p => p.criticalConditions > 0);
                        break;
                    case 'followup':
                        filtered = filtered.filter(p => p.followUpRequired);
                        break;
                }
                
                return filtered;
            }
            
            searchPatients(query) {
                if (!query) {
                    this.renderPatients();
                    return;
                }
                
                const filtered = this.patients.filter(patient => 
                    patient.name.toLowerCase().includes(query.toLowerCase()) ||
                    patient.email.toLowerCase().includes(query.toLowerCase()) ||
                    patient.phone.includes(query)
                );
                
                this.patients = filtered;
                this.currentPage = 1;
                this.renderPatients();
                this.loadPatients(); // Reset to original list
            }
            
            filterPatients() {
                this.currentPage = 1;
                this.renderPatients();
            }
            
            updatePagination() {
                const filteredPatients = this.getFilteredPatients();
                const totalPages = Math.ceil(filteredPatients.length / this.patientsPerPage);
                
                const pagination = document.getElementById('pagination');
                if (!pagination) return;
                
                let paginationHTML = `
                    <button onclick="changePage('prev')" ${this.currentPage === 1 ? 'disabled' : ''}>
                        <i class="fas fa-chevron-left"></i>
                    </button>
                `;
                
                for (let i = 1; i <= Math.min(totalPages, 3); i++) {
                    paginationHTML += `
                        <button class="${i === this.currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>
                    `;
                }
                
                paginationHTML += `
                    <button onclick="changePage('next')" ${this.currentPage === totalPages ? 'disabled' : ''}>
                        <i class="fas fa-chevron-right"></i>
                    </button>
                `;
                
                pagination.innerHTML = paginationHTML;
            }
            
            formatDate(dateString) {
                const date = new Date(dateString);
                return date.toLocaleDateString('en-US', { 
                    month: 'short', 
                    day: 'numeric', 
                    year: 'numeric' 
                });
            }
        }
        
        // Global functions
        function addNewPatient() {
            window.location.href = '/patients/new';
        }
        
        function viewPatientDetails(patientId) {
            window.location.href = `/patients/${patientId}`;
        }
        
        function startAnalysis(patientId) {
            window.location.href = `/analysis/patient/${patientId}`;
        }
        
        function viewHistory(patientId) {
            window.location.href = `/patients/${patientId}/history`;
        }
        
        function changePage(direction) {
            const manager = window.patientsManager;
            const filteredPatients = manager.getFilteredPatients();
            const totalPages = Math.ceil(filteredPatients.length / manager.patientsPerPage);
            
            if (direction === 'prev' && manager.currentPage > 1) {
                manager.currentPage--;
            } else if (direction === 'next' && manager.currentPage < totalPages) {
                manager.currentPage++;
            }
            
            manager.renderPatients();
        }
        
        function goToPage(page) {
            window.patientsManager.currentPage = page;
            window.patientsManager.renderPatients();
        }
        
        function logout() {
            sessionStorage.removeItem('skinx_token');
            sessionStorage.removeItem('skinx_user');
            localStorage.removeItem('skinx_token');
            localStorage.removeItem('skinx_user');
            window.location.href = '/login';
        }
