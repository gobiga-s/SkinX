<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SkinX</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}">
</head>
<body>
    <div class="mobile-container">
        <!-- Header -->
        <div class="header">
            <div class="medical-illustration">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1>Create Account</h1>
            <p>Join SkinX Medical AI Platform</p>
        </div>

        <!-- Content -->
        <div class="content">
            <div class="card fade-in">
                <div class="card-title">
                    <i class="fas fa-user-plus"></i>
                    Sign Up
                </div>

                <div id="errorMessage" class="toast error" style="display: none;"></div>
                <div id="successMessage" class="toast success" style="display: none;"></div>

                <form id="signupForm">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-input" id="fullName" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" class="form-input" id="phone" placeholder="Enter your phone number" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Role</label>
                        <select class="form-input" id="role" required>
                            <option value="">Select your role</option>
                            <option value="user">User</option>
                            <option value="doctor">Doctor</option>
                            <option value="nurse">Nurse</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Department (for Medical Staff)</label>
                        <input type="text" class="form-input" id="department" placeholder="e.g., Dermatology">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="password" placeholder="Create a strong password" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" class="form-input" id="confirmPassword" placeholder="Confirm your password" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Profile Image (Optional)</label>
                        <div class="upload-area" id="profileUploadArea">
                            <div class="upload-icon">
                                <i class="fas fa-camera"></i>
                            </div>
                            <p class="upload-text">Upload Profile Image</p>
                            <p class="upload-hint">Click or drag & drop</p>
                            <input type="file" id="profileImage" accept="image/*" style="display: none;">
                        </div>
                        <div class="image-preview" id="profilePreview" style="display: none;">
                            <img src="" alt="Profile Preview" class="preview-img" id="profilePreviewImg">
                            <div class="preview-actions">
                                <button type="button" class="preview-btn" onclick="removeProfileImage()">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="checkbox" id="terms" required>
                            <span style="font-size: 0.9rem; color: var(--text-dark);">
                                I agree to the <a href="#" style="color: var(--primary-color);">Terms & Conditions</a>
                            </span>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary" id="signupBtn">
                        <i class="fas fa-user-plus"></i> Sign Up
                    </button>
                </form>

                <div style="text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid #E8ECEF;">
                    <p style="color: var(--text-light); font-size: 0.9rem;">
                        Already have an account?
                        <a href="/login" style="color: var(--primary-color); text-decoration: none; font-weight: 500;">
                            Login
                        </a>
                    </p>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="/login" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-file-medical"></i>
                <span>Reports</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </a>
        </nav>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div style="text-align: center;">
            <div class="loading-spinner"></div>
            <p class="loading-text">Creating account...</p>
        </div>
    </div>

    <script>
        class MobileSignup {
            constructor() {
                this.profileImage = null;
                this.initializeEventListeners();
            }

            initializeEventListeners() {
                const signupForm = document.getElementById('signupForm');
                if (signupForm) {
                    signupForm.addEventListener('submit', (e) => {
                        e.preventDefault();
                        this.handleSignup();
                    });
                }

                const profileUploadArea = document.getElementById('profileUploadArea');
                const profileImageInput = document.getElementById('profileImage');

                if (profileUploadArea && profileImageInput) {
                    profileUploadArea.addEventListener('click', () => {
                        profileImageInput.click();
                    });

                    profileImageInput.addEventListener('change', (e) => {
                        const file = e.target.files[0];
                        if (file) {
                            this.handleProfileImage(file);
                        }
                    });

                    // Drag and drop
                    profileUploadArea.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        profileUploadArea.classList.add('dragover');
                    });

                    profileUploadArea.addEventListener('dragleave', (e) => {
                        e.preventDefault();
                        profileUploadArea.classList.remove('dragover');
                    });

                    profileUploadArea.addEventListener('drop', (e) => {
                        e.preventDefault();
                        profileUploadArea.classList.remove('dragover');
                        const file = e.dataTransfer.files[0];
                        if (file) {
                            this.handleProfileImage(file);
                        }
                    });
                }
            }

            handleProfileImage(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('profilePreviewImg').src = e.target.result;
                    document.getElementById('profileUploadArea').style.display = 'none';
                    document.getElementById('profilePreview').style.display = 'block';
                    this.profileImage = file;
                };
                reader.readAsDataURL(file);
            }

            async handleSignup() {
                const fullName = document.getElementById('fullName').value;
                const email = document.getElementById('email').value;
                const phone = document.getElementById('phone').value;
                const role = document.getElementById('role').value;
                const department = document.getElementById('department').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const terms = document.getElementById('terms').checked;
                const signupBtn = document.getElementById('signupBtn');
                const loadingOverlay = document.getElementById('loadingOverlay');

                if (!fullName || !email || !phone || !role || !password || !confirmPassword) {
                    this.showError('Please fill in all required fields');
                    return;
                }

                if (password !== confirmPassword) {
                    this.showError('Passwords do not match');
                    return;
                }

                if (!terms) {
                    this.showError('Please agree to the Terms & Conditions');
                    return;
                }

                // Show loading
                loadingOverlay.classList.add('active');
                signupBtn.disabled = true;

                try {
                    const response = await fetch('/api/signup', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            firstName: fullName.split(' ')[0],
                            lastName: fullName.split(' ').slice(1).join(' ') || '',
                            email: email,
                            phone: phone,
                            role: role,
                            department: department || 'General',
                            password: password
                        })
                    });

                    const result = await response.json();

                    if (result.success) {
                        this.showSuccess('Account created successfully! Redirecting to login...');
                        setTimeout(() => {
                            window.location.href = '/login';
                        }, 2000);
                    } else {
                        throw new Error(result.error || 'Signup failed');
                    }
                } catch (error) {
                    this.showError('Signup failed: ' + error.message);
                } finally {
                    loadingOverlay.classList.remove('active');
                    signupBtn.disabled = false;
                }
            }

            showError(message) {
                const errorDiv = document.getElementById('errorMessage');
                const successDiv = document.getElementById('successMessage');
                
                if (errorDiv) {
                    errorDiv.textContent = message;
                    errorDiv.style.display = 'block';
                }
                
                if (successDiv) {
                    successDiv.style.display = 'none';
                }
                
                setTimeout(() => {
                    if (errorDiv) {
                        errorDiv.style.display = 'none';
                    }
                }, 3000);
            }

            showSuccess(message) {
                const successDiv = document.getElementById('successMessage');
                const errorDiv = document.getElementById('errorMessage');
                
                if (successDiv) {
                    successDiv.textContent = message;
                    successDiv.style.display = 'block';
                }
                
                if (errorDiv) {
                    errorDiv.style.display = 'none';
                }
                
                setTimeout(() => {
                    if (successDiv) {
                        successDiv.style.display = 'none';
                    }
                }, 3000);
            }
        }

        function removeProfileImage() {
            document.getElementById('profileUploadArea').style.display = 'block';
            document.getElementById('profilePreview').style.display = 'none';
            document.getElementById('profileImage').value = '';
            window.signupApp.profileImage = null;
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.signupApp = new MobileSignup();
        });
    </script>
</body>
</html>
