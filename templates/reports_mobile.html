<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - SkinX</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}">
</head>
<body>
    <div class="mobile-container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-file-medical"></i>
            </div>
            <h1>Medical Reports</h1>
            <p>Analysis History</p>
        </div>

        <!-- Content -->
        <div class="content">
            <!-- Filter Options -->
            <div class="card fade-in">
                <div class="card-title">
                    <i class="fas fa-filter"></i>
                    Filter Reports
                </div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="btn btn-outline btn-sm" onclick="filterReports('all')">All</button>
                    <button class="btn btn-outline btn-sm" onclick="filterReports('high')">High Risk</button>
                    <button class="btn btn-outline btn-sm" onclick="filterReports('medium')">Medium Risk</button>
                    <button class="btn btn-outline btn-sm" onclick="filterReports('low')">Low Risk</button>
                </div>
            </div>

            <!-- Reports List -->
            <div id="reportsList">
                <div style="text-align: center; padding: 30px; color: var(--text-light);">
                    <i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 10px;"></i>
                    <p>Loading reports...</p>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="/dashboard" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="/reports" class="nav-item active">
                <i class="fas fa-file-medical"></i>
                <span>Reports</span>
            </a>
            <a href="/profile" class="nav-item">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </a>
        </nav>
    </div>

    <!-- Report Detail Modal -->
    <div class="loading-overlay" id="reportModal" style="display: none; background: rgba(0,0,0,0.5);">
        <div class="card" style="width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto;">
            <div class="card-title">
                <i class="fas fa-file-medical"></i>
                Report Details
            </div>
            <div id="reportDetails">
                <!-- Report details will be loaded here -->
            </div>
            <button class="btn btn-primary" style="margin-top: 15px;" onclick="closeReportModal()">Close</button>
        </div>
    </div>

    <script>
        class ReportsPage {
            constructor() {
                this.reports = [];
                this.loadReports();
            }

            async loadReports() {
                try {
                    const response = await fetch('/api/analyses');
                    const data = await response.json();
                    
                    this.reports = data.analyses || [];
                    this.displayReports(this.reports);
                } catch (error) {
                    document.getElementById('reportsList').innerHTML = `
                        <div style="text-align: center; padding: 30px; color: var(--error-color);">
                            <i class="fas fa-exclamation-circle" style="font-size: 2rem; margin-bottom: 10px;"></i>
                            <p>Failed to load reports</p>
                        </div>
                    `;
                }
            }

            displayReports(reports) {
                if (reports.length === 0) {
                    document.getElementById('reportsList').innerHTML = `
                        <div style="text-align: center; padding: 30px; color: var(--text-light);">
                            <i class="fas fa-file-medical" style="font-size: 2rem; margin-bottom: 10px;"></i>
                            <p>No reports yet</p>
                            <button class="btn btn-primary" style="margin-top: 15px;" onclick="window.location.href='/dashboard'">
                                <i class="fas fa-plus"></i> Create Analysis
                            </button>
                        </div>
                    `;
                    return;
                }

                const reportsHtml = reports.map(report => `
                    <div class="card fade-in" onclick="viewReport(${report.id})">
                        <div class="result-header">
                            <div class="result-icon" style="background: ${this.getRiskColor(report.risk)}">
                                <i class="fas fa-microscope"></i>
                            </div>
                            <div class="result-disease">
                                <h3>${report.disease_detected}</h3>
                                <span class="confidence-badge">${(report.confidence * 100).toFixed(1)}% Confidence</span>
                            </div>
                        </div>
                        <div class="result-details">
                            <div class="result-detail">
                                <span class="detail-label">Risk Level:</span>
                                <span class="detail-value risk-${report.risk.toLowerCase()}">${report.risk}</span>
                            </div>
                            <div class="result-detail">
                                <span class="detail-label">Date:</span>
                                <span class="detail-value">${new Date(report.created_at).toLocaleDateString()}</span>
                            </div>
                            <div class="result-detail">
                                <span class="detail-label">Severity:</span>
                                <span class="detail-value">${report.severity || 'N/A'}</span>
                            </div>
                        </div>
                    </div>
                `).join('');

                document.getElementById('reportsList').innerHTML = reportsHtml;
            }

            filterReports(filter) {
                let filteredReports = this.reports;
                
                if (filter !== 'all') {
                    filteredReports = this.reports.filter(report => 
                        report.risk.toLowerCase() === filter
                    );
                }
                
                this.displayReports(filteredReports);
            }

            viewReport(reportId) {
                const report = this.reports.find(r => r.id === reportId);
                if (!report) return;

                const reportDetails = `
                    <div class="result-header">
                        <div class="result-icon" style="background: ${this.getRiskColor(report.risk)}">
                            <i class="fas fa-microscope"></i>
                        </div>
                        <div class="result-disease">
                            <h3>${report.disease_detected}</h3>
                            <span class="confidence-badge">${(report.confidence * 100).toFixed(1)}% Confidence</span>
                        </div>
                    </div>
                    <div class="result-details">
                        <div class="result-detail">
                            <span class="detail-label">Risk Level:</span>
                            <span class="detail-value risk-${report.risk.toLowerCase()}">${report.risk}</span>
                        </div>
                        <div class="result-detail">
                            <span class="detail-label">Severity:</span>
                            <span class="detail-value">${report.severity || 'N/A'}</span>
                        </div>
                        <div class="result-detail">
                            <span class="detail-label">Treatment:</span>
                            <span class="detail-value">${report.treatment || 'N/A'}</span>
                        </div>
                        <div class="result-detail">
                            <span class="detail-label">Date:</span>
                            <span class="detail-value">${new Date(report.created_at).toLocaleString()}</span>
                        </div>
                        <div class="result-detail">
                            <span class="detail-label">Analysis Type:</span>
                            <span class="detail-value">${report.analysis_type || 'Image'}</span>
                        </div>
                    </div>
                `;

                document.getElementById('reportDetails').innerHTML = reportDetails;
                document.getElementById('reportModal').style.display = 'flex';
            }

            closeReportModal() {
                document.getElementById('reportModal').style.display = 'none';
            }

            getRiskColor(risk) {
                switch(risk?.toLowerCase()) {
                    case 'high': return 'var(--error-color)';
                    case 'medium': return 'var(--warning-color)';
                    case 'low': return 'var(--secondary-color)';
                    default: return 'var(--primary-color)';
                }
            }
        }

        function filterReports(filter) {
            window.reportsPage.filterReports(filter);
        }

        function viewReport(reportId) {
            window.reportsPage.viewReport(reportId);
        }

        function closeReportModal() {
            window.reportsPage.closeReportModal();
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.reportsPage = new ReportsPage();
        });
    </script>
</body>
</html>
