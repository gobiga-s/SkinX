<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SkinX</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/web.css') }}">
    <style>
        .signup-page {
            display: flex;
            min-height: 100vh;
            background: #F5F7FA;
        }

        .signup-left {
            flex: 0 0 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: linear-gradient(135deg, rgba(74, 144, 226, 0.05), rgba(80, 200, 120, 0.05));
            overflow-y: auto;
        }

        .signup-right {
            flex: 0 0 60%;
            position: relative;
            background: url('https://images.unsplash.com/photo-1579684385127-1ef15d508118?w=1920&h=1080&fit=crop') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .signup-right::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(80, 200, 120, 0.85), rgba(74, 144, 226, 0.75));
            backdrop-filter: blur(5px);
        }

        .signup-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 0.6s ease-out;
            z-index: 10;
        }

        .signup-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .signup-logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #50C878, #4A90E2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
        }

        .signup-header h1 {
            font-size: 28px;
            color: #1F2D3D;
            margin: 0 0 8px;
            font-weight: 700;
        }

        .signup-header p {
            font-size: 14px;
            color: #6B7C93;
            margin: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-input-wrapper {
            position: relative;
        }

        .form-input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #6B7C93;
            font-size: 16px;
            transition: color 0.3s;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px 12px 48px;
            border: 2px solid #E0E6ED;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            background: #FFFFFF;
        }

        .form-input:focus {
            outline: none;
            border-color: #4A90E2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        .form-input:focus + i {
            color: #4A90E2;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 500;
            color: #1F2D3D;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-gradient {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #50C878, #4A90E2);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(80, 200, 120, 0.3);
        }

        .btn-gradient:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .signup-footer {
            text-align: center;
            font-size: 14px;
            color: #6B7C93;
            margin-top: 24px;
        }

        .signup-footer a {
            color: #50C878;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .signup-footer a:hover {
            color: #4A90E2;
        }

        .visual-content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
            max-width: 500px;
            animation: fadeInRight 0.6s ease-out;
        }

        .visual-content h2 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .visual-content p {
            font-size: 18px;
            opacity: 0.95;
            line-height: 1.6;
        }

        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }

        .floating-card {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 16px;
            animation: float 6s ease-in-out infinite;
        }

        .floating-card:nth-child(1) {
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-card:nth-child(2) {
            top: 60%;
            right: 15%;
            animation-delay: 2s;
        }

        .floating-card:nth-child(3) {
            bottom: 20%;
            left: 20%;
            animation-delay: 4s;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @media (max-width: 968px) {
            .signup-page {
                flex-direction: column;
            }

            .signup-left,
            .signup-right {
                flex: 1;
            }

            .signup-right {
                min-height: 300px;
                padding: 40px;
            }

            .visual-content h2 {
                font-size: 28px;
            }

            .visual-content p {
                font-size: 16px;
            }
        }

        @media (max-width: 576px) {
            .signup-left {
                padding: 24px;
            }

            .signup-card {
                padding: 28px;
            }

            .signup-right {
                display: none;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="signup-page">
        <!-- Left Section - Signup Form -->
        <div class="signup-left">
            <div class="signup-card">
                <div class="signup-header">
                    <div class="signup-logo">
                        <i class="fas fa-user-plus"></i>
                    </div>
                    <h1>Create Your Account</h1>
                    <p>Join the SkinX Medical AI Platform</p>
                </div>

                <form id="signupForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Full Name</label>
                            <div class="form-input-wrapper">
                                <input type="text" class="form-input" id="fullName" placeholder="John Doe" required>
                                <i class="fas fa-user"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <div class="form-input-wrapper">
                                <input type="email" class="form-input" id="email" placeholder="john@example.com" required>
                                <i class="fas fa-envelope"></i>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Phone</label>
                            <div class="form-input-wrapper">
                                <input type="tel" class="form-input" id="phone" placeholder="+1 (555) 000-0000">
                                <i class="fas fa-phone"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Role</label>
                            <div class="form-input-wrapper">
                                <select class="form-input" id="role" required>
                                    <option value="">Select Role</option>
                                    <option value="user">User</option>
                                    <option value="doctor">Doctor</option>
                                    <option value="nurse">Nurse</option>
                                    <option value="admin">Admin</option>
                                </select>
                                <i class="fas fa-user-tag"></i>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="form-input-wrapper">
                            <input type="password" class="form-input" id="password" placeholder="Create password" required>
                            <i class="fas fa-lock"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <div class="form-input-wrapper">
                            <input type="password" class="form-input" id="confirmPassword" placeholder="Confirm password" required>
                            <i class="fas fa-lock"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; color: #6B7C93;">
                            <input type="checkbox" id="terms" required>
                            I agree to the Terms & Conditions
                        </label>
                    </div>

                    <button type="submit" class="btn-gradient" id="signupBtn">
                        <i class="fas fa-user-plus"></i>
                        <span>Create Account</span>
                    </button>

                    <div class="signup-footer">
                        Already have an account? <a href="/login">Login</a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Right Section - Visual Experience -->
        <div class="signup-right">
            <div class="floating-elements">
                <div class="floating-card">
                    <i class="fas fa-dna" style="font-size: 24px; color: white;"></i>
                </div>
                <div class="floating-card">
                    <i class="fas fa-microscope" style="font-size: 24px; color: white;"></i>
                </div>
                <div class="floating-card">
                    <i class="fas fa-heartbeat" style="font-size: 24px; color: white;"></i>
                </div>
            </div>
            <div class="visual-content">
                <h2>Join the Future of Dermatology</h2>
                <p>Experience AI-powered skin disease detection with our advanced medical platform</p>
            </div>
        </div>
    </div>

    <script>
        class WebSignup {
            constructor() {
                this.initializeEventListeners();
            }

            initializeEventListeners() {
                const signupForm = document.getElementById('signupForm');
                if (signupForm) {
                    signupForm.addEventListener('submit', (e) => {
                        e.preventDefault();
                        this.handleSignup();
                    });
                }
            }

            async handleSignup() {
                const fullName = document.getElementById('fullName').value;
                const email = document.getElementById('email').value;
                const phone = document.getElementById('phone').value;
                const role = document.getElementById('role').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const terms = document.getElementById('terms').checked;
                const signupBtn = document.getElementById('signupBtn');
                const btnText = signupBtn.querySelector('span');
                const btnIcon = signupBtn.querySelector('i');

                if (!fullName || !email || !role || !password || !confirmPassword) {
                    this.showToast('Please fill in all required fields', 'error');
                    return;
                }

                if (password !== confirmPassword) {
                    this.showToast('Passwords do not match', 'error');
                    return;
                }

                if (!terms) {
                    this.showToast('Please agree to the Terms & Conditions', 'error');
                    return;
                }

                const originalText = btnText.textContent;
                const originalIcon = btnIcon.className;
                
                btnText.textContent = 'Creating account...';
                btnIcon.className = 'spinner';
                signupBtn.disabled = true;

                try {
                    const response = await fetch('/api/signup', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            name: fullName,
                            email: email,
                            phone: phone,
                            role: role,
                            password: password
                        })
                    });

                    const result = await response.json();

                    if (result.success) {
                        this.showToast('Account created successfully! Redirecting to login...', 'success');
                        setTimeout(() => {
                            window.location.href = '/login';
                        }, 2000);
                    } else {
                        throw new Error(result.error || 'Signup failed');
                    }
                } catch (error) {
                    this.showToast('Signup failed: ' + error.message, 'error');
                } finally {
                    btnText.textContent = originalText;
                    btnIcon.className = originalIcon;
                    signupBtn.disabled = false;
                }
            }

            showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    padding: 16px 24px;
                    background: ${type === 'success' ? '#50C878' : '#FF6B6B'};
                    color: white;
                    border-radius: 10px;
                    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                    z-index: 1000;
                    animation: slideIn 0.3s ease-out;
                    font-weight: 500;
                `;
                toast.textContent = message;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.animation = 'slideOut 0.3s ease-out';
                    setTimeout(() => toast.remove(), 3000);
                }, 3000);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new WebSignup();
        });
    </script>
</body>
</html>
